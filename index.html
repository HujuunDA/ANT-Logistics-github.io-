<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ANT China Supplier - Smart Freight Calculator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            padding: 12px 12px 32px;
            min-height: 100vh;
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .compact-header {
            background: #1a2a4f;
            border-radius: 20px 20px 16px 16px;
            padding: 10px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        .brand-name {
            font-weight: 700;
            font-size: 16px;
            color: white;
            letter-spacing: -0.3px;
        }
        .brand-sub {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            font-weight: 400;
        }
        .version {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.12);
            padding: 3px 8px;
            border-radius: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
        }
        
        .card-header {
            padding: 12px 14px 8px 14px;
            border-bottom: 1px solid #eff3f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: #1a2a4f;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header h3 i {
            font-size: 14px;
            color: #3a6ea5;
        }
        
        .card-body {
            padding: 12px 14px;
        }
        
        .form-row {
            margin-bottom: 10px;
        }
        .form-row:last-child {
            margin-bottom: 0;
        }
        .label {
            font-size: 12px;
            font-weight: 500;
            color: #5a6e8a;
            margin-bottom: 4px;
            display: block;
        }
        input, .ios-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: all 0.15s;
        }
        input:focus {
            border-color: #3a6ea5;
            box-shadow: 0 0 0 3px rgba(58,110,165,0.1);
            background: white;
        }
        
        .date-item {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .date-item input {
            flex: 1;
        }
        .remove-date-btn {
            background: #f1f5f9;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            cursor: pointer;
        }
        
        .cargo-card {
            background: #fafcff;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #eef2f8;
        }
        .cargo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .cargo-title {
            font-weight: 600;
            font-size: 14px;
            color: #1a2a4f;
        }
        .cargo-title i {
            color: #3a6ea5;
            margin-right: 6px;
        }
        
        .radio-group {
            display: flex;
            gap: 16px;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 30px;
            width: fit-content;
            margin-bottom: 10px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
        }
        .radio-item input {
            width: 16px;
            height: 16px;
            margin: 0;
            accent-color: #3a6ea5;
        }
        
        .dimension-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .dimension-row .form-row {
            flex: 1;
            margin-bottom: 0;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3a6ea5, #2c5a8c);
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }
        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 10px;
            font-weight: 500;
            font-size: 13px;
            color: #3a6ea5;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }
        .btn-clear {
            background: rgba(220,38,38,0.08);
            border: 1px solid rgba(220,38,38,0.2);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 500;
            color: #dc2626;
        }
        .btn-danger {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }
        
        .rate-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .rate-row .form-row {
            flex: 1;
            margin-bottom: 0;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .result-item {
            background: #f8fafc;
            border-radius: 14px;
            padding: 10px 8px;
            text-align: center;
        }
        .result-label {
            font-size: 10px;
            color: #5a6e8a;
        }
        .result-value {
            font-weight: 700;
            font-size: 14px;
            color: #1a2a4f;
        }
        .result-total {
            grid-column: span 2;
            background: linear-gradient(135deg, #eef5ff, #e0edfc);
            border-radius: 14px;
            padding: 10px;
            text-align: center;
        }
        .total-value {
            font-size: 20px;
            font-weight: 800;
            color: #2c5a8c;
        }
        
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 4px 0;
        }
        .collapsible-header h4 {
            font-size: 13px;
            font-weight: 600;
            color: #1a2a4f;
        }
        .collapse-icon {
            font-size: 11px;
            color: #3a6ea5;
            background: #f1f5f9;
            width: 26px;
            height: 26px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .collapse-icon.collapsed {
            transform: rotate(180deg);
        }
        .collapsible-content {
            max-height: 300px;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        .collapsible-content.collapsed {
            max-height: 0;
        }
        .collapsed-preview {
            background: #f8fafc;
            border-radius: 12px;
            padding: 8px 12px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }
        .collapsed-preview.hidden {
            display: none;
        }
        
        .cargo-table-wrapper {
            overflow-x: auto;
            margin-top: 8px;
        }
        .cargo-table-wrapper table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }
        .cargo-table-wrapper th {
            background: #f8fafc;
            padding: 8px 6px;
            font-weight: 600;
            color: #334155;
        }
        .cargo-table-wrapper td {
            padding: 8px 6px;
            border-bottom: 1px solid #eff3f6;
        }
        
        .image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .preview-block {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .preview-block img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .delete-img-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.6);
            width: 18px;
            height: 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            cursor: pointer;
        }
        .camera-block {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(58,110,165,0.08);
            border: 1px dashed #3a6ea5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            gap: 4px;
        }
        .camera-block i {
            font-size: 22px;
            color: #3a6ea5;
        }
        .camera-block span {
            font-size: 9px;
            color: #3a6ea5;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: white;
            border-radius: 28px;
            width: 260px;
            padding: 24px;
            text-align: center;
        }
        .hidden { display: none; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-size: 13px;
            z-index: 2000;
            white-space: nowrap;
        }
        
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
        .mt-3 { margin-top: 12px; }
        .mb-3 { margin-bottom: 12px; }
        .w-full { width: 100%; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
    </style>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log("SW registration failed", e));
        }
    </script>
</head>
<body>
<div class="main-container">
    <!-- 紧凑头部 - 已修改为 ANT China Supplier -->
    <div class="compact-header">
        <div class="brand">
            <span class="brand-name">ANT China Supplier</span>
            <span class="brand-sub">Smart Calculator</span>
        </div>
        <div class="version">v2.5</div>
    </div>

    <!-- Customer Info Card -->
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-user-circle"></i>Customer</h3>
            <button id="clear-all-btn" class="btn-clear"><i class="fas fa-eraser"></i> Clear</button>
        </div>
        <div class="card-body">
            <div class="form-row">
                <label class="label">Name</label>
                <input type="text" id="customerName" placeholder="Customer name">
            </div>
            <div class="form-row">
                <label class="label">Order Date(s)</label>
                <div id="order-dates-list"></div>
                <button id="add-date-btn" class="btn-secondary mt-2"><i class="fas fa-plus"></i> Add Date</button>
            </div>
        </div>
    </div>

    <!-- Cargo List -->
    <div id="cargo-list"></div>
    <button id="add-cargo-btn" class="btn-primary mb-2"><i class="fas fa-plus-circle"></i> Add Cargo</button>

    <!-- Rates & Results -->
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-sliders-h"></i>Rates</h3>
        </div>
        <div class="card-body">
            <div class="rate-row">
                <div class="form-row"><label class="label">¥/kg</label><input type="number" id="kgRate" value="20" step="1"></div>
                <div class="form-row"><label class="label">¥/m³</label><input type="number" id="cbmRate" value="1700" step="10"></div>
                <div class="form-row"><label class="label">Ks/¥</label><input type="number" id="exchangeRate" value="630" step="5"></div>
            </div>
            
            <div id="cargo-details-container">
                <div class="collapsible-header" id="cargoDetailsHeader">
                    <h4><i class="fas fa-list-ul"></i> Cargo Details</h4>
                    <div class="collapse-icon" id="collapseIcon"><i class="fas fa-chevron-up"></i></div>
                </div>
                <div id="collapsedPreview" class="collapsed-preview hidden">
                    <span>Total Freight</span>
                    <span class="preview-total" id="previewTotalRMB">0.00 ¥</span>
                </div>
                <div id="cargoDetailsContent" class="collapsible-content">
                    <div id="cargo-details-table-container"></div>
                </div>
            </div>
            
            <div class="mt-3">
                <div class="results-grid" id="results">
                    <div class="result-item"><div class="result-label">Weight</div><div class="result-value" id="totalKg">0 kg</div></div>
                    <div class="result-item"><div class="result-label">Volume</div><div class="result-value" id="totalVolume">0 m³</div></div>
                    <div class="result-item"><div class="result-label">Weight ¥</div><div class="result-value" id="totalKgCost">0 ¥</div></div>
                    <div class="result-item"><div class="result-label">Volume ¥</div><div class="result-value" id="totalVolumeCost">0 ¥</div></div>
                    <div class="result-total"><div class="result-label">Total (RMB)</div><div class="total-value" id="totalCostRMB">0 ¥</div></div>
                    <div class="result-total"><div class="result-label">Total (MMK)</div><div class="total-value" id="totalCostMMK">0 Ks</div></div>
                </div>
            </div>
        </div>
    </div>
    
    <button id="export-pdf-btn" class="btn-primary btn-danger"><i class="fas fa-share-nodes"></i> Export & Share PDF</button>
</div>

<div id="custom-modal" class="modal-overlay hidden">
    <div class="modal-card">
        <i class="fas fa-exclamation-circle" style="font-size: 40px; color: #3a6ea5; margin-bottom: 12px;"></i>
        <p id="modal-message" style="margin-bottom: 20px;">Please enter customer name and order date!</p>
        <button onclick="closeModal()" class="btn-primary" style="padding: 8px;">OK</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.0.0-rc.5/dist/html2canvas.min.js"></script>
<script src="https://unpkg.com/jspdf-font-source-han-sans@1.0.0/dist/SourceHanSansCN-Normal.js"></script>
<script src="https://unpkg.com/jspdf-font-montserrat@1.0.0/dist/Montserrat-Regular.js"></script>

<script>
    (function(){
        const cargoListDiv = document.getElementById('cargo-list');
        const addCargoBtn = document.getElementById('add-cargo-btn');
        const exportPdfBtn = document.getElementById('export-pdf-btn');
        const clearAllBtn = document.getElementById('clear-all-btn');
        const customerNameInput = document.getElementById('customerName');
        const addDateBtn = document.getElementById('add-date-btn');
        const orderDatesList = document.getElementById('order-dates-list');
        const kgRateInput = document.getElementById('kgRate');
        const cbmRateInput = document.getElementById('cbmRate');
        const exchangeRateInput = document.getElementById('exchangeRate');
        const cargoDetailsTableContainer = document.getElementById('cargo-details-table-container');
        
        const cargoDetailsHeader = document.getElementById('cargoDetailsHeader');
        const cargoDetailsContent = document.getElementById('cargoDetailsContent');
        const collapseIcon = document.getElementById('collapseIcon');
        const collapsedPreview = document.getElementById('collapsedPreview');
        let isCollapsed = false;
        
        function toggleCollapse() {
            isCollapsed = !isCollapsed;
            if (isCollapsed) {
                cargoDetailsContent.classList.add('collapsed');
                collapseIcon.classList.add('collapsed');
                collapsedPreview.classList.remove('hidden');
            } else {
                cargoDetailsContent.classList.remove('collapsed');
                collapseIcon.classList.remove('collapsed');
                collapsedPreview.classList.add('hidden');
            }
        }
        cargoDetailsHeader.addEventListener('click', toggleCollapse);

        let cargoCounter = 0;
        let dateCounter = 0;
        const cargoData = [];
        const cargoImages = {};

        const DB_NAME = 'FreightDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'freightData';
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                if (db && db.name === DB_NAME) { resolve(db); return; }
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (event) => {
                    const dbRef = event.target.result;
                    if (!dbRef.objectStoreNames.contains(STORE_NAME)) dbRef.createObjectStore(STORE_NAME);
                };
            });
        }

        async function saveData() {
            try {
                const database = await openDB();
                const data = {
                    customerName: customerNameInput.value,
                    orderDates: Array.from(orderDatesList.querySelectorAll('.order-date-input')).map(inp => inp.value),
                    kgRate: kgRateInput.value,
                    cbmRate: cbmRateInput.value,
                    exchangeRate: exchangeRateInput.value,
                    cargos: [],
                    cargoImages: cargoImages,
                    isDetailsCollapsed: isCollapsed
                };
                document.querySelectorAll('.cargo-item').forEach(item => {
                    const cargoId = item.id.split('-')[1];
                    const calcTypeRadio = item.querySelector(`input[name="calc-type-${cargoId}"]:checked`);
                    const calcType = calcTypeRadio ? calcTypeRadio.value : 'weight';
                    data.cargos.push({
                        id: cargoId, type: calcType,
                        kg: item.querySelector('.kg-input')?.value || '',
                        length: item.querySelector('.length-input')?.value || '',
                        width: item.querySelector('.width-input')?.value || '',
                        height: item.querySelector('.height-input')?.value || ''
                    });
                });
                const transaction = database.transaction([STORE_NAME], 'readwrite');
                transaction.objectStore(STORE_NAME).put(data, 'freightData');
                await new Promise((resolve, reject) => { transaction.oncomplete = resolve; transaction.onerror = () => reject(transaction.error); });
            } catch(e) { console.warn("Save failed", e); }
        }

        async function loadData() {
            try {
                const database = await openDB();
                const store = database.transaction([STORE_NAME], 'readonly').objectStore(STORE_NAME);
                const data = await new Promise(resolve => { const req = store.get('freightData'); req.onsuccess = () => resolve(req.result); });
                if (data) {
                    customerNameInput.value = data.customerName || '';
                    kgRateInput.value = data.kgRate || '20';
                    cbmRateInput.value = data.cbmRate || '1700';
                    exchangeRateInput.value = data.exchangeRate || '630';
                    if (data.orderDates && data.orderDates.length) data.orderDates.forEach(d => addDateInput(d));
                    else addDateInput();
                    if (data.cargoImages) Object.assign(cargoImages, data.cargoImages);
                    if (data.cargos && data.cargos.length) data.cargos.forEach(c => addCargoItem(c));
                    else addCargoItem();
                    if (data.isDetailsCollapsed !== undefined && data.isDetailsCollapsed) {
                        isCollapsed = false;
                        toggleCollapse();
                    }
                } else { addCargoItem(); addDateInput(); }
                recalculateAll();
            } catch(e) { addCargoItem(); addDateInput(); recalculateAll(); }
        }

        async function clearAllData() {
            customerNameInput.value = '';
            while(orderDatesList.firstChild) orderDatesList.removeChild(orderDatesList.firstChild);
            dateCounter = 0;
            while(cargoListDiv.firstChild) cargoListDiv.removeChild(cargoListDiv.firstChild);
            cargoCounter = 0;
            Object.keys(cargoImages).forEach(k => delete cargoImages[k]);
            try {
                const database = await openDB();
                const transaction = database.transaction([STORE_NAME], 'readwrite');
                transaction.objectStore(STORE_NAME).delete('freightData');
            } catch(e) {}
            addDateInput();
            addCargoItem();
            recalculateAll();
        }

        function showModal(msg) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-message').innerText = msg;
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('hidden'), 2000);
        }
        window.closeModal = () => document.getElementById('custom-modal').classList.add('hidden');

        function updateCargoDetailsTable() {
            const previewTotalSpan = document.getElementById('previewTotalRMB');
            if (cargoData.length === 0) {
                cargoDetailsTableContainer.innerHTML = `<p class="text-center text-gray-400 py-4 text-xs">No cargo added</p>`;
                if (previewTotalSpan) previewTotalSpan.innerText = '0.00 ¥';
                return;
            }
            const totalCostRMB = cargoData.reduce((sum, i) => sum + i.totalCost, 0).toFixed(2);
            if (previewTotalSpan) previewTotalSpan.innerText = totalCostRMB + ' ¥';
            
            let html = `<div class="cargo-table-wrapper"><table><thead><tr><th>#</th><th>Type</th><th>Weight</th><th>Dimensions</th><th>Vol</th><th>¥</th></tr></thead><tbody>`;
            cargoData.forEach(item => {
                if (item.type === 'weight') {
                    html += `<tr><td class="font-medium">${item.id}</td><td>W</td><td>${item.kg.toFixed(2)}</td><td>-</td><td>-</td><td class="font-semibold">${item.totalCost.toFixed(2)}</td></tr>`;
                } else {
                    const dim = `${item.length.toFixed(2)}x${item.width.toFixed(2)}x${item.height.toFixed(2)}`;
                    html += `<tr><td class="font-medium">${item.id}</td><td>V</td><td>-</td><td>${dim}</td><td>${item.volume.toFixed(3)}</td><td class="font-semibold">${item.totalCost.toFixed(2)}</td></tr>`;
                }
            });
            html += `<tr class="border-t"><td colspan="5" class="text-right font-medium">Total</td><td class="font-bold">${totalCostRMB}</td></tr>`;
            html += `</tbody></table></div>`;
            cargoDetailsTableContainer.innerHTML = html;
        }

        function recalculateAll() {
            let totalKg = 0, totalVolume = 0, totalKgCost = 0, totalVolumeCost = 0;
            cargoData.length = 0;
            const kgRate = parseFloat(kgRateInput.value) || 0;
            const cbmRate = parseFloat(cbmRateInput.value) || 0;
            const exchangeRate = parseFloat(exchangeRateInput.value) || 0;
            document.querySelectorAll('.cargo-item').forEach(item => {
                const cargoId = item.id.split('-')[1];
                const calcType = item.querySelector(`input[name="calc-type-${cargoId}"]:checked`).value;
                let singleCost = 0, kg = 0, len = 0, wid = 0, hei = 0, vol = 0;
                if (calcType === 'weight') {
                    kg = parseFloat(item.querySelector('.kg-input').value) || 0;
                    singleCost = kg * kgRate;
                    totalKgCost += singleCost;
                    totalKg += kg;
                } else {
                    len = parseFloat(item.querySelector('.length-input').value) || 0;
                    wid = parseFloat(item.querySelector('.width-input').value) || 0;
                    hei = parseFloat(item.querySelector('.height-input').value) || 0;
                    vol = len * wid * hei;
                    singleCost = vol * cbmRate;
                    totalVolumeCost += singleCost;
                    totalVolume += vol;
                }
                cargoData.push({ id: cargoId, type: calcType, kg, length: len, width: wid, height: hei, volume: vol, totalCost: singleCost });
                const detailsDiv = item.querySelector('.calculation-details');
                if (calcType === 'weight') detailsDiv.innerHTML = `<div class="mt-2 text-[#3a6ea5] text-xs font-medium">Freight: ${singleCost.toFixed(2)} ¥</div>`;
                else detailsDiv.innerHTML = `<div class="mt-2 text-[#3a6ea5] text-xs">Volume: ${vol.toFixed(3)} m³<br>Freight: ${singleCost.toFixed(2)} ¥</div>`;
            });
            const totalRMB = totalKgCost + totalVolumeCost;
            const totalMMK = Math.round(totalRMB * exchangeRate);
            document.getElementById('totalKg').innerText = totalKg.toFixed(1) + ' kg';
            document.getElementById('totalVolume').innerText = totalVolume.toFixed(3) + ' m³';
            document.getElementById('totalKgCost').innerText = totalKgCost.toFixed(0) + ' ¥';
            document.getElementById('totalVolumeCost').innerText = totalVolumeCost.toFixed(0) + ' ¥';
            document.getElementById('totalCostRMB').innerText = totalRMB.toFixed(0) + ' ¥';
            document.getElementById('totalCostMMK').innerText = totalMMK.toLocaleString('en-US') + ' Ks';
            updateCargoDetailsTable();
            saveData();
        }

        function addDateInput(value = '') {
            dateCounter++;
            const div = document.createElement('div');
            div.className = 'date-item';
            div.id = `order-date-${dateCounter}`;
            div.innerHTML = `<input type="date" value="${value}" class="order-date-input"><div onclick="removeDateInput(${dateCounter})" class="remove-date-btn"><i class="fas fa-times"></i></div>`;
            orderDatesList.appendChild(div);
            div.querySelector('.order-date-input').addEventListener('input', recalculateAll);
            recalculateAll();
        }
        window.removeDateInput = (id) => { document.getElementById(`order-date-${id}`)?.remove(); recalculateAll(); };
        addDateBtn.addEventListener('click', () => addDateInput());

        function renderImageGrid(cargoId, container) {
            const images = cargoImages[cargoId] || [];
            container.innerHTML = '';
            images.forEach((imgUrl, idx) => {
                const previewDiv = document.createElement('div');
                previewDiv.className = 'preview-block';
                const img = document.createElement('img');
                img.src = imgUrl;
                const delBtn = document.createElement('div');
                delBtn.className = 'delete-img-btn';
                delBtn.innerHTML = '✕';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    images.splice(idx, 1);
                    renderImageGrid(cargoId, container);
                    saveData();
                };
                previewDiv.appendChild(img);
                previewDiv.appendChild(delBtn);
                container.appendChild(previewDiv);
            });
            const cameraDiv = document.createElement('div');
            cameraDiv.className = 'camera-block';
            cameraDiv.innerHTML = '<i class="fas fa-camera"></i><span>Add</span>';
            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'file';
            hiddenInput.accept = 'image/*';
            hiddenInput.classList.add('hidden-file-input');
            hiddenInput.style.display = 'none';
            hiddenInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const dataURL = ev.target.result;
                    if (!cargoImages[cargoId]) cargoImages[cargoId] = [];
                    cargoImages[cargoId].push(dataURL);
                    renderImageGrid(cargoId, container);
                    saveData();
                };
                reader.readAsDataURL(file);
                hiddenInput.value = '';
            };
            cameraDiv.onclick = () => { hiddenInput.click(); };
            container.appendChild(cameraDiv);
            container.appendChild(hiddenInput);
        }

        function addCargoItem(data = {}) {
            cargoCounter++;
            const cid = String(cargoCounter);
            if (!cargoImages[cid]) cargoImages[cid] = (data.images ? [...data.images] : []);
            const cargoDiv = document.createElement('div');
            cargoDiv.className = 'cargo-item cargo-card';
            cargoDiv.id = `cargo-${cid}`;
            cargoDiv.innerHTML = `
                <div class="cargo-header">
                    <span class="cargo-title"><i class="fas fa-box"></i>Cargo #${cid}</span>
                    <div class="remove-date-btn" onclick="removeCargo(${cid})"><i class="fas fa-trash-alt"></i></div>
                </div>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="calc-type-${cid}" value="weight" ${data.type === 'weight' || !data.type ? 'checked' : ''}> Weight</label>
                    <label class="radio-item"><input type="radio" name="calc-type-${cid}" value="volume" ${data.type === 'volume' ? 'checked' : ''}> Volume</label>
                </div>
                <div id="weight-inputs-${cid}"><input type="number" value="${data.kg || ''}" class="kg-input w-full" placeholder="Weight (kg)" step="0.01"></div>
                <div id="volume-inputs-${cid}" class="hidden">
                    <div class="dimension-row">
                        <div><input type="number" value="${data.length || ''}" class="length-input" placeholder="L (m)" step="0.001"></div>
                        <div><input type="number" value="${data.width || ''}" class="width-input" placeholder="W (m)" step="0.001"></div>
                        <div><input type="number" value="${data.height || ''}" class="height-input" placeholder="H (m)" step="0.001"></div>
                    </div>
                </div>
                <div class="mt-2"><div id="image-grid-${cid}" class="image-grid"></div></div>
                <div class="calculation-details"></div>
            `;
            cargoListDiv.appendChild(cargoDiv);
            const weightDiv = document.getElementById(`weight-inputs-${cid}`);
            const volumeDiv = document.getElementById(`volume-inputs-${cid}`);
            if (data.type === 'volume') { weightDiv.classList.add('hidden'); volumeDiv.classList.remove('hidden'); }
            else { weightDiv.classList.remove('hidden'); volumeDiv.classList.add('hidden'); }
            
            const gridContainer = document.getElementById(`image-grid-${cid}`);
            renderImageGrid(cid, gridContainer);
            
            cargoDiv.querySelectorAll(`input[name="calc-type-${cid}"]`).forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const isWeight = e.target.value === 'weight';
                    weightDiv.classList.toggle('hidden', !isWeight);
                    volumeDiv.classList.toggle('hidden', isWeight);
                    recalculateAll();
                });
            });
            cargoDiv.querySelectorAll('.kg-input, .length-input, .width-input, .height-input').forEach(inp => inp.addEventListener('input', recalculateAll));
            recalculateAll();
        }

        window.removeCargo = (id) => {
            document.getElementById(`cargo-${id}`)?.remove();
            delete cargoImages[String(id)];
            recalculateAll();
        };

        addCargoBtn.addEventListener('click', () => addCargoItem());
        clearAllBtn.addEventListener('click', clearAllData);
        kgRateInput.addEventListener('input', recalculateAll);
        cbmRateInput.addEventListener('input', recalculateAll);
        exchangeRateInput.addEventListener('input', recalculateAll);
        customerNameInput.addEventListener('input', recalculateAll);
        
        let loadingToast = null;
        function showLoadingToast(msg) {
            if(loadingToast) loadingToast.remove();
            const div = document.createElement('div');
            div.className = 'toast';
            div.innerHTML = `<i class="fab fa-telegram-plane"></i> ${msg}`;
            document.body.appendChild(div);
            loadingToast = div;
        }
        function hideLoadingToast() { if(loadingToast){ loadingToast.remove(); loadingToast = null; } }

        async function generatePdfBlob() {
            const { jsPDF } = window.jspdf;
            const customerName = customerNameInput.value.trim();
            const orderDates = Array.from(document.querySelectorAll('.order-date-input')).map(inp => inp.value.trim()).filter(Boolean);
            if (!customerName || orderDates.length === 0) throw new Error('Missing customer or dates');
            
            let bgImageData = null;
            try {
                const resp = await fetch('bg.png');
                if(resp.ok) { const blob = await resp.blob(); bgImageData = await new Promise(r => { const fr = new FileReader(); fr.onloadend = () => r(fr.result); fr.readAsDataURL(blob); }); }
            } catch(e){}
            
            const doc = new jsPDF('p', 'mm', 'a4');
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 15;
            let yPos = 30;
            const applyBg = (d, img) => { if(img) d.addImage(img, 'PNG', 0, 0, pageWidth, pageHeight, undefined, 'FAST'); };
            if(bgImageData) applyBg(doc, bgImageData);
            doc.setFont('Montserrat', 'normal');
            doc.setFontSize(22); doc.setFont(undefined, 'bold');
            doc.text('INTERNATIONAL SHIPPING', pageWidth/2, yPos, {align:'center'});
            yPos+=10;
            doc.setFont('SourceHanSans', 'normal'); doc.setFontSize(11);
            doc.text(`Name: ${customerName}`, margin, yPos); yPos+=6;
            const dateStr = orderDates.map(d=>d.split('-').slice(1,3).join('-')).join(', ');
            doc.text(`Order Date: ${dateStr}`, margin, yPos); yPos+=10;
            const kgRate = parseFloat(kgRateInput.value)||0, cbmRate = parseFloat(cbmRateInput.value)||0, exRate = parseFloat(exchangeRateInput.value)||0;
            const headers = ["No.", "Type", `Weight(kg/${kgRate}¥)`, "Dimensions(m)", `Volume(m³/${cbmRate}¥)`, "Freight(¥)"];
            const body = cargoData.map(i => i.type==='weight' ? [i.id, "By Weight", i.kg.toFixed(2), "-", "-", i.totalCost.toFixed(2)] : [i.id, "By Volume", "-", `${i.length.toFixed(3)}x${i.width.toFixed(3)}x${i.height.toFixed(3)}`, i.volume.toFixed(3), i.totalCost.toFixed(2)]);
            
            // 修改: 表头颜色从蓝色 [230,240,255] 改为黑色 [0,0,0]
            doc.autoTable({ 
                startY: yPos, 
                head: [headers], 
                body: body, 
                theme: 'grid', 
                styles: { fontSize: 9, font: 'SourceHanSans', halign: 'center', textColor: [0,0,0] },
                headStyles: { fillColor: [0,0,0], textColor: [255,255,255], fontStyle: 'bold' },
                margin: { top: margin, bottom: 45 } 
            });
            let finalY = doc.autoTable.previous.finalY;
            const totalWeight = cargoData.reduce((s,i)=>s+(i.kg||0),0).toFixed(2);
            const totalVol = cargoData.reduce((s,i)=>s+(i.volume||0),0).toFixed(3);
            doc.setFontSize(10); doc.text(`Total Weight: ${totalWeight} kg`, margin, finalY+5);
            doc.text(`Total Volume: ${totalVol} m³`, pageWidth-margin, finalY+5, {align:'right'});
            const totalRMB = cargoData.reduce((s,i)=>s+i.totalCost,0).toFixed(2);
            const totalMMK = Math.round(parseFloat(totalRMB)*exRate).toLocaleString('en-US');
            doc.setFontSize(11); doc.setFont(undefined, 'bold'); doc.text("Total Freight (RMB):", margin, finalY+13);
            doc.text(`${totalRMB} ¥`, pageWidth-margin, finalY+13, {align:'right'});
            doc.setFontSize(9); doc.text("Exchange Rate:", margin, finalY+20);
            doc.text(`1 ¥ = ${exRate.toFixed(2)} Ks`, pageWidth-margin, finalY+20, {align:'right'});
            doc.setFontSize(12); doc.setTextColor(61,149,255);
            doc.text("Total Remittance Amount (MMK):", margin, finalY+28);
            doc.text(`${totalMMK} Ks`, pageWidth-margin, finalY+28, {align:'right'});
            doc.setTextColor(0,0,0);
            const idsWithImg = Object.keys(cargoImages).filter(id=>cargoImages[id]?.length);
            if(idsWithImg.length){
                doc.addPage(); if(bgImageData) applyBg(doc, bgImageData);
                let cy = margin;
                doc.setFontSize(14); doc.text('Cargo Images', pageWidth/2, cy, {align:'center'}); cy+=12;
                for(const cid of idsWithImg){
                    for(const imgSrc of cargoImages[cid]){
                        const imgObj = new Image(); imgObj.src=imgSrc;
                        await new Promise(r=>{ imgObj.onload=r; imgObj.onerror=r; });
                        if(imgObj.naturalWidth===0) continue;
                        const ratio = imgObj.naturalHeight/imgObj.naturalWidth;
                        const imgW = pageWidth-2*margin;
                        const imgH = imgW*ratio;
                        if(cy+imgH>pageHeight-margin){ doc.addPage(); if(bgImageData) applyBg(doc, bgImageData); cy=margin; doc.setFontSize(12); doc.text('Cargo Images (continued)', pageWidth/2, cy, {align:'center'}); cy+=10; }
                        doc.text(`Cargo #${cid} Image`, margin, cy-3);
                        doc.addImage(imgSrc, 'JPEG', margin, cy, imgW, imgH, undefined, 'SLOW');
                        cy += imgH+12;
                    }
                }
            }
            return doc.output('blob');
        }

        async function shareToTelegram() {
            const customerName = customerNameInput.value.trim();
            const orderDates = Array.from(document.querySelectorAll('.order-date-input')).map(inp => inp.value.trim()).filter(Boolean);
            if (!customerName || orderDates.length === 0) {
                showModal('Please enter customer name and order date!');
                return;
            }
            try {
                showLoadingToast('Generating PDF...');
                const pdfBlob = await generatePdfBlob();
                const firstOrderDate = orderDates[0] || 'nodate';
                const safeName = customerName.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
                const fileName = `${safeName}_${firstOrderDate}_Freight.pdf`;
                const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: 'Freight Calculation',
                        text: `Freight quote for ${customerName}`,
                        files: [file]
                    });
                    hideLoadingToast();
                } else {
                    const url = URL.createObjectURL(pdfBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    hideLoadingToast();
                    showModal('PDF saved!');
                }
            } catch (err) {
                hideLoadingToast();
                console.error(err);
                showModal('Failed: ' + err.message);
            }
        }

        exportPdfBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            await shareToTelegram();
        });
        
        loadData();
    })();
</script>
</body>
</html>
